<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pusher Protocol v8.3.0 测试客户端</title>
    <script src="https://js.pusher.com/8.3.0/pusher.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            background: #f5f5f5;
        }
        
        .container {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        
        h1 {
            color: #333;
            border-bottom: 3px solid #4CAF50;
            padding-bottom: 10px;
        }
        
        h2 {
            color: #555;
            margin-top: 0;
        }
        
        .status {
            padding: 10px;
            border-radius: 4px;
            margin: 10px 0;
            font-weight: bold;
        }
        
        .status.connected {
            background: #d4edda;
            color: #155724;
        }
        
        .status.disconnected {
            background: #f8d7da;
            color: #721c24;
        }
        
        .status.connecting {
            background: #fff3cd;
            color: #856404;
        }
        
        input, button, select {
            padding: 8px 12px;
            margin: 5px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }
        
        button {
            background: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        button:hover {
            background: #45a049;
        }
        
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        
        .danger {
            background: #f44336;
        }
        
        .danger:hover {
            background: #da190b;
        }
        
        #logs {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 15px;
            border-radius: 4px;
            height: 400px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.5;
        }
        
        .log-event {
            color: #4CAF50;
        }
        
        .log-data {
            color: #2196F3;
        }
        
        .log-error {
            color: #f44336;
        }
        
        .log-time {
            color: #999;
        }
        
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        
        @media (max-width: 768px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }
        
        .info-box {
            background: #e3f2fd;
            border-left: 4px solid #2196F3;
            padding: 10px;
            margin: 10px 0;
        }
        
        code {
            background: rgba(0,0,0,0.05);
            padding: 2px 6px;
            border-radius: 3px;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <h1>🚀 Pusher Protocol v8.3.0 测试客户端</h1>
    
    <div class="container">
        <h2>� 用户登录</h2>
        <div>
            <label>用户名: </label>
            <input type="text" id="username" value="superAdmin" style="width: 200px;">
            <label>密码: </label>
            <input type="password" id="password" value="admin123" style="width: 200px;">
            <button onclick="login()">🔑 登录</button>
            <button onclick="logout()" class="danger">🚪 退出</button>
        </div>
        <div id="loginStatus" class="status disconnected">● 未登录</div>
        <div class="info-box" id="userInfo" style="display: none;">
            <strong>用户信息:</strong> <span id="userDetail">-</span>
        </div>        <div class="info-box" style="background: #fff3cd; border-left-color: #ffc107;">
            <strong>🔐 安全说明:</strong> 密码使用 AES-ECB 加密传输（密钥需与配置文件 <code>settings.aesKey</code> 一致）
        </div>    </div>
    
    <div class="container">
        <h2>📡 连接配置</h2>
        <div>
            <label>App Key: </label>
            <input type="text" id="appKey" value="devinggo-app-key" style="width: 300px;">
        </div>
        <div>
            <label>WebSocket Host: </label>
            <input type="text" id="wsHost" value="localhost" style="width: 200px;">
            <label>Port: </label>
            <input type="number" id="wsPort" value="8070" style="width: 80px;">
        </div>
        <div>
            <label>JWT Token: </label>
            <input type="text" id="token" placeholder="登录后自动填充" style="width: 400px;" readonly>
        </div>
        <div>
            <button onclick="connect()">🔌 连接</button>
            <button onclick="disconnect()" class="danger">❌ 断开</button>
        </div>
        <div id="status" class="status disconnected">● 未连接</div>
        <div class="info-box">
            <strong>Socket ID:</strong> <span id="socketId">-</span>
        </div>
    </div>
    
    <div class="grid">
        <div class="container">
            <h2>📢 Public Channel</h2>
            <div>
                <input type="text" id="publicChannel" value="chat-room" placeholder="频道名">
                <button onclick="subscribePublic()">订阅</button>
            </div>
            <div style="margin-top: 10px;">
                <strong>状态:</strong> <span id="publicStatus">未订阅</span>
            </div>
            <div style="margin-top: 10px;">
                <button onclick="testPublicClientEvent()" class="danger">
                    ⚠️ 测试Public频道Client Event（应失败）
                </button>
            </div>
        </div>
        
        <div class="container">
            <h2>🔒 Private Channel</h2>
            <div>
                <input type="text" id="privateChannel" value="private-user-123" placeholder="private-*">
                <button onclick="subscribePrivate()">订阅</button>
            </div>
            <div style="margin-top: 10px;">
                <strong>状态:</strong> <span id="privateStatus">未订阅</span>
            </div>
            <div style="margin-top: 10px;">
                <input type="text" id="clientEvent" value="client-typing" placeholder="client-*">
                <input type="text" id="clientEventData" value='{"user":"Alice"}' placeholder="JSON数据">
                <button onclick="sendClientEvent()">发送Client Event</button>
            </div>
        </div>
    </div>
    
    <div class="container">
        <h2>👥 Presence Channel</h2>
        <div>
            <input type="text" id="presenceChannel" value="presence-lobby" placeholder="presence-*">
            <button onclick="subscribePresence()">订阅</button>
        </div>
        <div style="margin-top: 10px;">
            <strong>状态:</strong> <span id="presenceStatus">未订阅</span>
        </div>
        <div id="membersInfo" style="margin-top: 10px;"></div>
    </div>
    
    <div class="container">
        <h2>🧪 速率限制测试</h2>
        <div>
            <button onclick="testRateLimit()">快速发送11条Client Event（测试速率限制）</button>
        </div>
        <div style="margin-top: 10px;">
            <strong>结果:</strong> <span id="rateLimitResult">等待测试...</span>
        </div>
    </div>
    
    <div class="container">
        <h2>📋 事件日志</h2>
        <button onclick="clearLogs()">清空日志</button>
        <div id="logs"></div>
    </div>
    
    <script>
        let pusher = null;
        let publicChannelObj = null;
        let privateChannelObj = null;
        let presenceChannelObj = null;
        
        // AES加密配置（与后端保持一致）
        const AES_KEY = '1234567890123456';  // 16字节密钥（AES-128）
        
        /**
         * AES-ECB加密（与后端secure.AESEncrypt保持一致）
         * @param {string} plaintext - 明文
         * @param {string} key - 密钥（16字节）
         * @returns {string} Base64编码的密文
         */
        function aesEncrypt(plaintext, key) {
            const keyHex = CryptoJS.enc.Utf8.parse(key);
            const encrypted = CryptoJS.AES.encrypt(plaintext, keyHex, {
                mode: CryptoJS.mode.ECB,
                padding: CryptoJS.pad.Pkcs7
            });
            return encrypted.toString();  // 返回Base64编码
        }
        
        function log(message, type = 'info') {
            try {
                const logs = document.getElementById('logs');
                if (!logs) {
                    console.error('❌ 找不到#logs元素！');
                    return;
                }
                const time = new Date().toLocaleTimeString();
                const className = type === 'error' ? 'log-error' : (type === 'event' ? 'log-event' : 'log-data');
                logs.innerHTML += `<div><span class="log-time">[${time}]</span> <span class="${className}">${message}</span></div>`;
                logs.scrollTop = logs.scrollHeight;
            } catch (e) {
                console.error('❌ log()函数错误:', e);
            }
        }
        
        function clearLogs() {
            document.getElementById('logs').innerHTML = '';
        }
        
        function updateLoginStatus(status, isLoggedIn, userInfo = null) {
            const statusEl = document.getElementById('loginStatus');
            statusEl.textContent = status;
            statusEl.className = 'status ' + (isLoggedIn ? 'connected' : 'disconnected');
            
            const userInfoEl = document.getElementById('userInfo');
            if (isLoggedIn && userInfo) {
                userInfoEl.style.display = 'block';
                document.getElementById('userDetail').textContent = userInfo;
            } else {
                userInfoEl.style.display = 'none';
            }
        }
        
        async function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const wsHost = document.getElementById('wsHost').value;
            const wsPort = document.getElementById('wsPort').value;
            
            if (!username || !password) {
                alert('请输入用户名和密码');
                return;
            }
            
            log('🔑 正在登录: ' + username, 'event');
            
            // AES加密密码
            const encryptedPassword = aesEncrypt(password, AES_KEY);
            log('🔐 密码已加密（AES-ECB）', 'data');
            
            try {
                const response = await fetch(`http://${wsHost}:${wsPort}/system/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        username: username,
                        password: encryptedPassword  // 发送加密后的密码
                    })
                });
                
                const result = await response.json();
                
                // 调试：打印完整响应
                console.log('🔍 登录接口响应:', result);
                console.log('🔍 result.code:', result.code, '(类型:', typeof result.code, ')');
                console.log('🔍 result.success:', result.success);
                console.log('🔍 result.data:', result.data);
                console.log('🔍 result.data.token:', result.data?.token);
                
                // 后端成功时返回: { code: 0, success: true, data: { token, expire } }
                if (result.success && result.data && result.data.token) {
                    const token = result.data.token;
                    const expire = result.data.expire;
                    
                    // 保存token到输入框
                    document.getElementById('token').value = token;
                    
                    // 保存到localStorage（带错误处理）
                    try {
                        localStorage.setItem('pusher_test_token', token);
                        localStorage.setItem('pusher_test_username', username);
                        log('💾 Token已保存到localStorage', 'data');
                        
                        // 验证保存是否成功
                        const savedToken = localStorage.getItem('pusher_test_token');
                        const savedUsername = localStorage.getItem('pusher_test_username');
                        if (savedToken && savedUsername) {
                            log('✅ localStorage验证成功: token和username已保存', 'data');
                        } else {
                            log('⚠️ localStorage验证失败: 数据未正确保存', 'error');
                        }
                    } catch (e) {
                        log('❌ localStorage保存失败: ' + e.message, 'error');
                        log('⚠️ 可能原因: 浏览器隐私模式、localStorage被禁用、或使用file://协议', 'error');
                    }
                    
                    updateLoginStatus('● 已登录', true, `${username} (Token过期时间: ${new Date(expire * 1000).toLocaleString()})`);
                    log('✅ 登录成功！Token已自动填充', 'event');
                    log('💾 Token前50字符: ' + token.substring(0, 50) + '...', 'data');
                } else {
                    log('❌ 登录失败: ' + (result.message || '未知错误'), 'error');
                    alert('登录失败: ' + (result.message || '未知错误'));
                }
            } catch (error) {
                log('❌ 登录请求失败: ' + error.message, 'error');
                alert('登录请求失败: ' + error.message);
            }
        }
        
        async function logout() {
            const token = document.getElementById('token').value;
            const wsHost = document.getElementById('wsHost').value;
            const wsPort = document.getElementById('wsPort').value;
            
            if (!token) {
                alert('未登录');
                return;
            }
            
            log('🚪 正在退出登录...', 'event');
            
            try {
                const response = await fetch(`http://${wsHost}:${wsPort}/system/logout`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token
                    }
                });
                
                const result = await response.json();
                
                // 后端成功时返回: { code: 0, success: true }
                if (result.success) {
                    // 清空token
                    document.getElementById('token').value = '';
                    localStorage.removeItem('pusher_test_token');
                    localStorage.removeItem('pusher_test_username');
                    
                    updateLoginStatus('● 未登录', false);
                    log('✅ 已退出登录', 'event');
                    
                    // 断开WebSocket连接
                    if (pusher) {
                        disconnect();
                    }
                } else {
                    log('⚠️ 退出登录响应异常: ' + (result.message || '未知错误'), 'error');
                    // 即使后端返回失败也清空本地token（容错处理）
                    document.getElementById('token').value = '';
                    localStorage.removeItem('pusher_test_token');
                    localStorage.removeItem('pusher_test_username');
                    updateLoginStatus('● 未登录', false);
                }
            } catch (error) {
                log('❌ 退出请求失败: ' + error.message, 'error');
                
                // 即使请求失败也清空本地token
                document.getElementById('token').value = '';
                localStorage.removeItem('pusher_test_token');
                updateLoginStatus('● 未登录', false);
            }
        }
        
        function updateStatus(status, isConnected) {
            const statusEl = document.getElementById('status');
            statusEl.textContent = status;
            statusEl.className = 'status ' + (isConnected ? 'connected' : (status.includes('连接中') ? 'connecting' : 'disconnected'));
        }
        
        function connect() {
            const appKey = document.getElementById('appKey').value;
            const wsHost = document.getElementById('wsHost').value;
            const wsPort = document.getElementById('wsPort').value;
            const token = document.getElementById('token').value;
            
            updateStatus('● 连接中...', false);
            log('🔌 正在连接到 ' + wsHost + ':' + wsPort, 'event');
            
            pusher = new Pusher(appKey, {
                wsHost: wsHost,
                wsPort: wsPort,
                forceTLS: false,
                enabledTransports: ['ws'],
                cluster: 'mt1',  // 自托管服务器必需（虚拟cluster名称）
                disableStats: true,  // 禁用统计信息
                authEndpoint: `http://${wsHost}:${wsPort}/system/pusher/auth`,
                auth: {
                    headers: token ? {
                        'Authorization': 'Bearer ' + token
                    } : {}
                }
            });
            
            pusher.connection.bind('connected', function() {
                updateStatus('● 已连接', true);
                const socketId = pusher.connection.socket_id;
                document.getElementById('socketId').textContent = socketId;
                log('✅ 连接成功！Socket ID: ' + socketId, 'event');
            });
            
            pusher.connection.bind('disconnected', function() {
                updateStatus('● 已断开', false);
                log('❌ 连接已断开', 'error');
            });
            
            pusher.connection.bind('error', function(err) {
                log('❌ 连接错误: ' + JSON.stringify(err), 'error');
            });
            
            // 监听所有Pusher错误事件（包括客户端事件错误）
            pusher.connection.bind('pusher:error', function(err) {
                log('❌ Pusher错误: ' + JSON.stringify(err), 'error');
                console.error('Pusher error:', err);
            });
            
            // 启用Pusher调试日志（在控制台输出）
            Pusher.logToConsole = true;
            log('🔧 已启用Pusher调试日志（请查看浏览器控制台）', 'data');
        }
        
        function disconnect() {
            if (pusher) {
                pusher.disconnect();
                updateStatus('● 未连接', false);
                document.getElementById('socketId').textContent = '-';
                log('🔌 已断开连接', 'event');
            }
        }
        
        function subscribePublic() {
            if (!pusher) {
                alert('请先连接！');
                return;
            }
            
            const channel = document.getElementById('publicChannel').value;
            log('📢 订阅Public频道: ' + channel, 'event');
            
            publicChannelObj = pusher.subscribe(channel);
            
            publicChannelObj.bind('pusher:subscription_succeeded', function() {
                document.getElementById('publicStatus').textContent = '✅ 已订阅';
                log('✅ Public频道订阅成功: ' + channel, 'event');
            });
            
            publicChannelObj.bind('pusher:subscription_error', function(err) {
                document.getElementById('publicStatus').textContent = '❌ 订阅失败';
                log('❌ Public频道订阅失败: ' + JSON.stringify(err), 'error');
            });
            
            // 监听所有事件
            publicChannelObj.bind_global(function(event, data) {
                if (!event.startsWith('pusher:')) {
                    log('📨 [' + channel + '] 收到事件: ' + event + ' => ' + JSON.stringify(data), 'data');
                }
            });
        }
        
        function testPublicClientEvent() {
            if (!publicChannelObj) {
                alert('请先订阅Public频道！');
                return;
            }
            
            log('⚠️ 尝试在Public频道发送Client Event（应返回错误4301）', 'event');
            
            publicChannelObj.trigger('client-test', {message: 'This should fail'});
            
            setTimeout(() => {
                log('⚠️ Public频道不允许Client Event，检查是否收到错误码4301', 'event');
            }, 1000);
        }
        
        function subscribePrivate() {
            if (!pusher) {
                alert('请先连接！');
                return;
            }
            
            const channel = document.getElementById('privateChannel').value;
            log('🔒 订阅Private频道: ' + channel + '（需要HTTP认证）', 'event');
            
            privateChannelObj = pusher.subscribe(channel);
            
            privateChannelObj.bind('pusher:subscription_succeeded', function() {
                document.getElementById('privateStatus').textContent = '✅ 已订阅';
                log('✅ Private频道订阅成功: ' + channel, 'event');
                log('🔍 [Debug] privateChannelObj.subscribed = true', 'data');
            });
            
            privateChannelObj.bind('pusher:subscription_error', function(err) {
                document.getElementById('privateStatus').textContent = '❌ 订阅失败（检查认证）';
                log('❌ Private频道订阅失败: ' + JSON.stringify(err), 'error');
                console.error('Subscription error:', err);
            });
            
            // 监听频道错误（包括客户端事件发送错误）
            privateChannelObj.bind('pusher:error', function(err) {
                log('❌ [' + channel + '] 频道错误: ' + JSON.stringify(err), 'error');
                console.error('Channel error:', err);
            });
            
            // 监听Client Event
            privateChannelObj.bind_global(function(event, data) {
                if (event.startsWith('client-')) {
                    log('📨 [' + channel + '] 收到Client Event: ' + event + ' => ' + JSON.stringify(data), 'data');
                } else if (!event.startsWith('pusher:')) {
                    // 其他服务器端事件
                    log('📨 [' + channel + '] 收到服务器事件: ' + event + ' => ' + JSON.stringify(data), 'data');
                }
            });
        }
        
        function sendClientEvent() {
            try {
                log('🔍 [Debug] sendClientEvent() 函数被调用', 'event');
                
                // 检查 Pusher 连接状态
                if (!pusher) {
                    const msg = '❌ 请先连接WebSocket！';
                    alert(msg);
                    log(msg, 'error');
                    return;
                }
                
                log('🔍 [Debug] Pusher连接状态: ' + pusher.connection.state, 'data');
                
                if (pusher.connection.state !== 'connected') {
                    const msg = '❌ WebSocket未连接，当前状态: ' + pusher.connection.state;
                    alert(msg);
                    log(msg, 'error');
                    return;
                }
                
                // 检查 Private 频道订阅状态
                if (!privateChannelObj) {
                    const msg = '❌ 请先订阅Private频道！';
                    alert(msg);
                    log(msg, 'error');
                    return;
                }
                
                log('🔍 [Debug] privateChannelObj 存在', 'data');
                log('🔍 [Debug] privateChannelObj.subscribed: ' + privateChannelObj.subscribed, 'data');
                log('🔍 [Debug] privateChannelObj.subscriptionPending: ' + privateChannelObj.subscriptionPending, 'data');
                log('🔍 [Debug] privateChannelObj.subscriptionCancelled: ' + privateChannelObj.subscriptionCancelled, 'data');
                
                // 修复：不检查 subscribed 属性，直接尝试发送
                // Pusher.js 的 subscribed 属性可能不可靠，只要订阅成功事件触发了就可以发送
                
                const event = document.getElementById('clientEvent').value;
                const dataStr = document.getElementById('clientEventData').value;
                
                log('🔍 [Debug] 事件名: ' + event, 'data');
                log('🔍 [Debug] 数据字符串: ' + dataStr, 'data');
                
                if (!event) {
                    const msg = '❌ 请输入事件名';
                    alert(msg);
                    log(msg, 'error');
                    return;
                }
                
                if (!event.startsWith('client-')) {
                    const msg = '❌ Client Event名称必须以 "client-" 开头';
                    alert(msg);
                    log(msg, 'error');
                    return;
                }
                
                const data = JSON.parse(dataStr);
                log('📤 发送Client Event: ' + event + ' => ' + JSON.stringify(data), 'event');
                
                const success = privateChannelObj.trigger(event, data);
                log('🔍 [Debug] trigger() 返回值: ' + success, 'data');
                
                if (success) {
                    log('✅ Client Event已发送', 'event');
                } else {
                    log('⚠️ Client Event发送可能失败（trigger返回false）', 'error');
                }
                
            } catch (e) {
                const msg = '❌ 发送失败: ' + e.message;
                alert(msg);
                log(msg, 'error');
                console.error('sendClientEvent error:', e);
            }
        }
        
        function subscribePresence() {
            if (!pusher) {
                alert('请先连接！');
                return;
            }
            
            const channel = document.getElementById('presenceChannel').value;
            log('👥 订阅Presence频道: ' + channel + '（需要HTTP认证）', 'event');
            
            presenceChannelObj = pusher.subscribe(channel);
            
            presenceChannelObj.bind('pusher:subscription_succeeded', function(members) {
                document.getElementById('presenceStatus').textContent = '✅ 已订阅';
                log('✅ Presence频道订阅成功: ' + channel, 'event');
                
                // 详细调试：打印members对象的所有信息
                console.log('========== Members 对象详细信息 ==========');
                console.log('🔍 members 对象:', members);
                console.log('🔍 typeof members:', typeof members);
                console.log('🔍 members.count:', members.count);
                console.log('🔍 members.members:', members.members);
                console.log('🔍 members.me:', members.me);
                console.log('🔍 members.myID:', members.myID);
                console.log('🔍 typeof members.each:', typeof members.each);
                console.log('🔍 typeof members.get:', typeof members.get);
                console.log('🔍 Object.keys(members):', Object.keys(members));
                
                // 尝试遍历 members 的所有属性
                for (let key in members) {
                    console.log('🔍 members[' + key + ']:', members[key]);
                }
                console.log('==========================================');
                
                const memberCount = members.count || 0;
                log('👥 当前成员数: ' + memberCount, 'data');
                
                // 尝试使用 get 方法获取成员
                if (typeof members.get === 'function' && members.myID) {
                    try {
                        const me = members.get(members.myID);
                        log('👤 当前用户 (使用get): ' + JSON.stringify(me), 'data');
                    } catch (e) {
                        log('❌ members.get() 失败: ' + e.message, 'error');
                    }
                }
                
                updateMembersInfo(members);
            });
            
            presenceChannelObj.bind('pusher:subscription_error', function(err) {
                document.getElementById('presenceStatus').textContent = '❌ 订阅失败（检查认证）';
                log('❌ Presence频道订阅失败: ' + JSON.stringify(err), 'error');
            });
            
            presenceChannelObj.bind('pusher:member_added', function(member) {
                log('👤 新成员加入: ' + member.id + ' => ' + JSON.stringify(member.info), 'event');
                updateMembersInfo(presenceChannelObj.members);
            });
            
            presenceChannelObj.bind('pusher:member_removed', function(member) {
                log('👤 成员离开: ' + member.id, 'event');
                updateMembersInfo(presenceChannelObj.members);
            });
        }
        
        function updateMembersInfo(members) {
            const membersInfo = document.getElementById('membersInfo');
            
            // Pusher.js Members 对象结构调试
            console.log('🔍 [updateMembersInfo] members:', members);
            console.log('🔍 [updateMembersInfo] members.count:', members.count);
            console.log('🔍 [updateMembersInfo] members.presence:', members.presence);
            
            // 如果 members 本身没有 count，尝试从 presence 属性获取
            let actualMembers = members;
            if (members.presence && typeof members.presence === 'object') {
                console.log('🔍 检测到 presence 嵌套结构，使用 members.presence');
                actualMembers = members.presence;
            }
            
            const memberCount = actualMembers.count || 0;
            const memberIds = actualMembers.ids || [];
            const memberHash = actualMembers.hash || {};
            
            console.log('🔍 memberCount:', memberCount);
            console.log('🔍 memberIds:', memberIds);
            console.log('🔍 memberHash:', memberHash);
            
            membersInfo.innerHTML = '<strong>当前成员:</strong> ' + memberCount + ' 人<br>';
            
            if (memberCount === 0 || memberIds.length === 0) {
                membersInfo.innerHTML += '<em>暂无成员</em><br>';
                return;
            }
            
            // 直接遍历 ids 和 hash
            memberIds.forEach(function(memberId) {
                const memberInfo = memberHash[memberId];
                if (memberInfo) {
                    membersInfo.innerHTML += '• ' + memberId + ': ' + JSON.stringify(memberInfo) + '<br>';
                    console.log('🔍 显示成员:', memberId, memberInfo);
                }
            });
            
            // 显示当前用户信息
            if (actualMembers.me) {
                log('👤 当前用户: ' + JSON.stringify(actualMembers.me), 'data');
            }
        }
        
        function testRateLimit() {
            if (!privateChannelObj) {
                alert('请先订阅Private频道！');
                return;
            }
            
            document.getElementById('rateLimitResult').textContent = '测试中...';
            log('🧪 开始速率限制测试：快速发送11条Client Event', 'event');
            
            let successCount = 0;
            let errorCount = 0;
            
            for (let i = 0; i < 11; i++) {
                setTimeout(() => {
                    try {
                        privateChannelObj.trigger('client-ratelimit-test', {seq: i + 1});
                        successCount++;
                        log('✅ 第' + (i + 1) + '条消息发送', 'data');
                    } catch (e) {
                        errorCount++;
                        log('❌ 第' + (i + 1) + '条消息失败（速率限制）', 'error');
                    }
                    
                    if (i === 10) {
                        setTimeout(() => {
                            const result = `成功: ${successCount}, 失败: ${errorCount}（预期：前10条成功，第11条失败）`;
                            document.getElementById('rateLimitResult').textContent = result;
                            log('🧪 速率限制测试完成: ' + result, 'event');
                        }, 500);
                    }
                }, i * 100); // 每100ms发送1条（10次/秒）
            }
        }

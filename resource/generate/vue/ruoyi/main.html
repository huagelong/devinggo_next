<script setup>
import { ref, reactive, computed, onMounted } from 'vue'
import { Message } from '@arco-design/web-vue'
import {% .tableCaseCamelLowerName %} from '@/api/{% .table.ModuleName %}/{% .tableCaseCamelLowerName %}'
import tool from '@/utils/tool'
import commonApi from '@/api/common'

// {% .columnsView %}

const queryParams = reactive({
{% range .columnsView %}
{% if .search %}
  {% .dataIndex %}: undefined,
{% end %}
{% end %}
})

const form = reactive({})
const loading = ref(false)
const formVisible = ref(false)
const showSearch = ref(true)
const ids = ref([])
const single = ref(true)
const multiple = ref(true)
const formTitle = computed(() => form.id ? '修改{% .table.TableComment %}' : '添加{% .table.TableComment %}')
const formRef = ref()

// 导入相关变量
const importVisible = ref(false)

const tableData = ref([])
const dictData = ref({})
const treeSelectData = ref([])
const pagination = reactive({
  current: 1,
  pageSize: 20,
  total: 0,
  showTotal: true,
  showPageSize: true,
  pageSizeOptions: [10, 20, 50, 100]
})

const rules = {
{% range .columnsView %}
{% if .commonRules.required %}
  {% .dataIndex %}: [
    { required: true, message: '{% .title %}不能为空', trigger: {% if or (eq .formType "select") (eq .formType "radio") %}'change'{% else %}'blur'{% end %} }
  ],
{% end %}
{% end %}
}

/** 初始化字典数据 */
async function initDictData() {
{% range .columnsView %}
  {% if .dict.name %}
    dictData.value.{% .dict.name %} = await tool.getDict('{% .dict.name %}')
  {% end %}
{% end %}
}

/** 查询列表 */
function handleQuery() {
  loading.value = true
  {% .tableCaseCamelLowerName %}.getPageList({
    ...queryParams,
    pageNum: pagination.current,
    pageSize: pagination.pageSize
  }).then(response => {
    if (response.success) {
      tableData.value = response.data.items || response.data.list || []
      pagination.total = response.data.pageInfo?.total || response.data.total || 0
    } else {
      Message.error(response.message || '查询失败')
    }
    loading.value = false
  }).catch(error => {
    Message.error('查询失败，请稍后重试')
    loading.value = false
  })
}

// 取消按钮
function handleCancel() {
  formVisible.value = false
  handleReset()
}

// 表单重置
function handleReset() {
  Object.keys(form).forEach(key => {
    form[key] = undefined
  })
  formRef.value?.resetFields()
}


/** 重置按钮操作 */
function resetQuery() {
  Object.keys(queryParams).forEach(key => {
    if (key !== 'pageNum' && key !== 'pageSize') {
      queryParams[key] = undefined
    }
  })
  handleQuery()
}

// 多选框选中数据
function handleSelectionChange(keys) {
  ids.value = keys
  single.value = keys.length !== 1
  multiple.value = !keys.length
}

/** 新增按钮操作 */
function handleAdd() {
  handleReset()
  formVisible.value = true
}

/** 修改按钮操作 */
function handleUpdate(row) {
  handleReset()
  const id = row?.id || ids.value[0]
  {% .tableCaseCamelLowerName %}.read(id).then(response => {
    if (response.success) {
      const data = response.data
      // 确保数字类型的字段转换为字符串
      if (data.sort !== undefined && data.sort !== null) {
        data.sort = String(data.sort)
      }
      if (data.status !== undefined && data.status !== null) {
        data.status = String(data.status)
      }
      Object.assign(form, data)
      formVisible.value = true
    } else {
      Message.error(response.message || '加载数据失败')
    }
  }).catch(error => {
    Message.error('加载数据失败，请稍后重试')
  })
}

/** 提交按钮 */
function handleSubmit() {
  return formRef.value?.validate().then(() => {
    const isAdd = !form.id
    const promise = isAdd
      ? {% .tableCaseCamelLowerName %}.save(form)
      : {% .tableCaseCamelLowerName %}.update(form.id, form)

    return promise.then(response => {
      if (response.success) {
        Message.success(response.message)
        formVisible.value = false
        handleQuery()
        return true
      }
      Message.error(response.message || (isAdd ? '新增失败' : '更新失败'))
      return false
    }).catch(() => {
      Message.error('操作失败')
      return false
    })
  }).catch(() => {
    return false
  })
}

/** 删除单条 */
function handleDeleteOne(record) {
  handleDelete([record.id])
}

/** 删除按钮操作 */
function handleDelete(deleteIds) {
  const delIds = deleteIds || ids.value
  if (!delIds || delIds.length === 0) {
    Message.warning('请选择要删除的数据')
    return
  }
  
  {% .tableCaseCamelLowerName %}.deletes({ ids: delIds }).then(response => {
    if (response.success) {
      Message.success(response.message)
      handleQuery()
    } else {
      Message.error(response.message || '删除失败')
    }
  }).catch(error => {
    Message.error('删除失败，请稍后重试')
  })
}

/** 导出按钮操作 */
function handleExport() {
  Message.info('请求服务器下载文件中...')
  
  // 准备导出参数
  const data = {
    ...queryParams,
    pageNum: undefined,
    pageSize: undefined
  }
  
  // 调用导出API
  {% .tableCaseCamelLowerName %}.exportExcel(data).then(res => {
    tool.download(res)
    Message.success('请求成功，文件开始下载')
  }).catch(() => {
    Message.error('请求服务器错误，下载失败')
  })
}

/** 数字字段变化事件 */
function handleNumberChange(record, fieldName) {
  {% .tableCaseCamelLowerName %}.numberOperation({
    id: record.id,
    numberName: fieldName,
    numberValue: record[fieldName]
  }).then(response => {
    if (response.success) {
      Message.success('更新成功')
      handleQuery()
    }
  }).catch(() => {
    Message.error('更新失败')
  })
}

/** 开关字段变化事件 */
function handleSwitchChange(record, fieldName) {
  const params = {
    id: record.id
  }
  params[fieldName] = record[fieldName]

  {% .tableCaseCamelLowerName %}.changeStatus(params).then(response => {
    if (response.success) {
      Message.success('更新成功')
      handleQuery()
    }
  }).catch(() => {
    Message.error('更新失败')
  })
}

/** 刷新 */
function handleRefresh() {
  handleQuery()
}

// 分页
function handlePageChange(page) {
  pagination.current = page
  handleQuery()
}

function handlePageSizeChange(pageSize) {
  pagination.pageSize = pageSize
  pagination.current = 1
  handleQuery()
}

/** 导入按钮操作 */
function handleImport() {
  importVisible.value = true
}

/** 下载模板 */
function handleDownloadTemplate() {
  Message.info('请求服务器下载文件中...')
  const url = "{% .table.ModuleName %}/{% .tableCaseCamelLowerName %}/downloadTemplate"
  if ( /^(http|https)/g.test(url) ) {
    window.open(url)
  } else {
    commonApi.download(url).then(res => {
      tool.download(res)
      Message.success('请求成功，文件开始下载')  
    })
  }

}

/** 导入请求 */
function handleImportRequest(option) {
  Message.info('文件上传导入中...')
  
  const formData = new FormData()
  formData.append('file', option.fileItem.file)
  
  {% .tableCaseCamelLowerName %}.importExcel(formData).then(response => {
    if (response.success) {
      Message.success(response.message || '导入成功')
      importVisible.value = false
      handleQuery()
    } else {
      Message.error(response.message || '导入失败')
    }
  }).catch(error => {
    Message.error('导入失败，请稍后重试')
  })
}

/** 导入取消 */
function handleImportCancel() {
  importVisible.value = false
}

// 初始化
onMounted(async () => {
  await initDictData()
  handleQuery()
})
</script>

<script>
export default {
  name: '{% .authCode %}'
}
</script>

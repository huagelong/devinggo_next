<script setup>
import { ref, reactive, computed, nextTick, onMounted } from 'vue'
import { Message, Modal } from '@arco-design/web-vue'
import {% .tableCaseCamelLowerName %} from '@/api/{% .table.ModuleName %}/{% .tableCaseCamelLowerName %}'
import tool from '@/utils/tool'

const queryParams = reactive({
{% range .columnsView %}
{% if .search %}
  {% .dataIndex %}: undefined,
{% end %}
{% end %}
})

const form = reactive({})
const loading = ref(false)
const formVisible = ref(false)
const showSearch = ref(true)
const formTitle = computed(() => form.id ? '编辑' : '添加')
const formRef = ref()
const isExpandAll = ref(false)
const refreshTable = ref(true)
const selectedRowKeys = ref([])
const expandedRowKeys = ref([])

const tableData = ref([])
const treeSelectData = ref([])
const dictData = ref({})

const rules = {
{% range .columnsView %}
{% if .commonRules.required %}
  {% .dataIndex %}: [
    { required: true, message: '{% .title %}不能为空', trigger: {% if or (eq .formType "select") (eq .formType "radio") %}'change'{% else %}'blur'{% end %} }
  ],
{% end %}
{% end %}
}

/** 初始化字典数据 */
async function initDictData() {
  {% range .columnsView %}
    {% if .dict.name %}
      dictData.value.{% .dict.name %} = await tool.getDict('{% .dict.name %}')
    {% end %}
  {% end %}
}

/** 查询{% .table.TableComment %}列表 */
function getList() {
  loading.value = true
  {% .tableCaseCamelLowerName %}.getList({
    ...queryParams
  }).then(response => {
    if (response.success) {
      tableData.value = response.data || []
      // 清理空的children数组
      cleanEmptyChildren(tableData.value)

      // 等待DOM更新后，重新计算展开的行
      nextTick(() => {
        if (isExpandAll.value) {
          const allKeys = getAllRowKeys(tableData.value)
          expandedRowKeys.value = allKeys
        } else {
          expandedRowKeys.value = []
        }
      })
    }
    loading.value = false
  }).catch(() => {
    loading.value = false
  })
}

/** 清理空的children数组 */
function cleanEmptyChildren(data) {
  if (!data || !Array.isArray(data)) return

  data.forEach(item => {
    if (item.children && Array.isArray(item.children) && item.children.length === 0) {
      delete item.children
    } else if (item.children && item.children.length > 0) {
      cleanEmptyChildren(item.children)
    }
  })
}

/** 递归获取所有行ID */
function getAllRowKeys(data, keys = []) {
  if (!data || !Array.isArray(data)) return keys

  data.forEach(item => {
    keys.push(item.{% .treeConfig.tree_id %})
    if (item.children && item.children.length > 0) {
      getAllRowKeys(item.children, keys)
    }
  })

  return keys
}

/** 在数据中查找指定ID的记录 */
function findRecordById(data, id) {
  if (!data || !Array.isArray(data)) return null

  for (let item of data) {
    if (item.{% .treeConfig.tree_id %} === id) {
      return item
    }
    if (item.children && item.children.length > 0) {
      const found = findRecordById(item.children, id)
      if (found) return found
    }
  }

  return null
}

/** 查询下拉树结构 */
function getTreeselect() {
  {% .tableCaseCamelLowerName %}.tree({ pageSize: 10000 }).then(response => {
    if (response.success) {
      treeSelectData.value = response.data || []
    }
  })
}

// 表单重置
function handleReset() {
  Object.keys(form).forEach(key => {
    form[key] = undefined
  })
  formRef.value?.resetFields()
}

/** 搜索按钮操作 */
function handleQuery() {
  getList()
}

/** 重置按钮操作 */
function resetQuery() {
  Object.keys(queryParams).forEach(key => {
    queryParams[key] = undefined
  })
  handleQuery()
}

/** 新增按钮操作 */
function handleAdd(row) {
  handleReset()
  getTreeselect()
{% if gt (len .treeConfig.tree_parent_id) 0 %}
  if (row != null && row.{% .treeConfig.tree_id %}) {
    form.{% .treeConfig.tree_parent_id %} = row.{% .treeConfig.tree_id %}
  } else {
    form.{% .treeConfig.tree_parent_id %} = 0
  }
{% end %}
  formVisible.value = true
}

/** 展开/折叠操作 */
function toggleExpandAll() {
  refreshTable.value = false
  isExpandAll.value = !isExpandAll.value
  nextTick(() => {
    refreshTable.value = true
  })
}

/** 修改按钮操作 */
async function handleUpdate(row) {
  handleReset()
  await getTreeselect()
{% if gt (len .treeConfig.tree_parent_id) 0 %}
  if (row != null) {
    form.{% .treeConfig.tree_parent_id %} = row.{% .treeConfig.tree_parent_id %}
  }
{% end %}
  const response = await {% .tableCaseCamelLowerName %}.read(row.id)
  if (response.success) {
    const data = response.data
    // 确保数字类型的字段转换为字符串
    if (data.sort !== undefined && data.sort !== null) {
      data.sort = String(data.sort)
    }
    if (data.status !== undefined && data.status !== null) {
      data.status = String(data.status)
    }
    Object.assign(form, data)
    formVisible.value = true
  }
}

/** 提交按钮 */
function handleSubmit() {
  return formRef.value?.validate().then(() => {
    const isAdd = !form.id
    const promise = isAdd
      ? {% .tableCaseCamelLowerName %}.save(form)
      : {% .tableCaseCamelLowerName %}.update(form.id, form)

    return promise.then(response => {
      if (response.success) {
        Message.success(response.message)
        formVisible.value = false
        getList()
        return true
      }
      return false
    }).catch(() => {
      Message.error('操作失败')
      return false
    })
  }).catch(() => {
    return false
  })
}

/** 删除按钮操作 */
function handleDelete(row) {
  {% .tableCaseCamelLowerName %}.deletes({ ids: [row.{% .treeConfig.tree_id %}] }).then(response => {
    if (response.success) {
      Message.success(response.message)
      getList()
    }
  })
}

/** 数字字段变化事件 */
function handleNumberChange(record, fieldName) {
  {% .tableCaseCamelLowerName %}.numberOperation({
    id: record.{% .treeConfig.tree_id %},
    numberName: fieldName,
    numberValue: record[fieldName]
  }).then(response => {
    if (response.success) {
      Message.success('更新成功')
      getList()
    }
  }).catch(() => {
    Message.error('更新失败')
  })
}

/** 开关字段变化事件 */
function handleSwitchChange(record, fieldName) {
  {% .tableCaseCamelLowerName %}.changeStatus({
    id: record.{% .treeConfig.tree_id %},
    [fieldName]: record[fieldName]
  }).then(response => {
    if (response.success) {
      Message.success('更新成功')
      getList()
    }
  }).catch(() => {
    Message.error('更新失败')
  })
}

/** 选择改变事件 */
function handleSelectionChange(rowKeys) {
  const previousKeys = selectedRowKeys.value
  const newKeys = new Set(rowKeys)
  const previousSet = new Set(previousKeys)

  // 找出新增的行（被选中的行）
  let addedKey = null
  for (let key of newKeys) {
    if (!previousSet.has(key)) {
      addedKey = key
      break
    }
  }

  // 找出被移除的行（被取消选中的行）
  let removedKey = null
  for (let key of previousSet) {
    if (!newKeys.has(key)) {
      removedKey = key
      break
    }
  }

  // 如果有新增的行，需要检查是否是父节点，如果是则选中所有子节点
  if (addedKey) {
    const record = findRecordById(tableData.value, addedKey)
    if (record && record.children && record.children.length > 0) {
      const childKeys = getAllRowKeys(record.children)
      childKeys.forEach(key => {
        if (!newKeys.has(key)) {
          newKeys.add(key)
        }
      })
    }
  }

  // 如果有移除的行，需要检查是否是父节点，如果是则取消选中所有子节点
  if (removedKey) {
    const record = findRecordById(tableData.value, removedKey)
    if (record && record.children && record.children.length > 0) {
      const childKeys = getAllRowKeys(record.children)
      childKeys.forEach(key => {
        newKeys.delete(key)
      })
    }
  }

  selectedRowKeys.value = Array.from(newKeys)
}

/** 批量删除按钮操作 */
function handleBatchDelete() {
  if (selectedRowKeys.value.length === 0) {
    Message.warning('请先选择要删除的记录')
    return
  }

  const confirmContent = `确定删除选中的 ${selectedRowKeys.value.length} 条记录及其子节点吗？`

  Modal.confirm({
    title: '删除确认',
    content: confirmContent,
    okText: '确定',
    cancelText: '取消',
    onOk: () => {
      {% .tableCaseCamelLowerName %}.deletes({ ids: selectedRowKeys.value }).then(response => {
        if (response.success) {
          Message.success(response.message)
          selectedRowKeys.value = []
          getList()
        }
      }).catch(() => {
        Message.error('删除失败')
      })
    }
  })
}

/** 刷新 */
function handleRefresh() {
  getList()
}

// 初始化
onMounted(async () => {
  await initDictData()
  getList()
})
</script>

export default {
  name: '{% .authCode %}'
}
